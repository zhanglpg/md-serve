name: Complexity Check

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  complexity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: zhanglpg/code-complexity-measure@v1
        with:
          path: '.'
          extras: 'go'
          post-comment: 'true'
